<!DOCTYPE html>

<style>

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}

  .header{text-align:center;padding:24px 0 16px}

<script>

  '晴':'☀️','少云':'🌤','多云':'⛅️','阴':'☁️','阴天':'☁️',
  '小雨':'🌦','中雨':'🌧','大雨':'🌧','暴雨':'🌧','大暴雨':'🌧',
  '雷阵雨':'⛈','雷暴':'⛈','冰雹':'🌨',
  '小雪':'🌨','中雪':'🌨','大雪':'❄️','暴雪':'❄️',
  '雾':'🌫','霾':'🌫','扬沙':'💨','浮尘':'💨','大风':'💨'
};
function wIcon(t){for(const[k,v]of Object.entries(WTH_ICON)){if(t.includes(k))return v;}return'🌤'}

// ─── 和风天气 → WMO（穿搭引擎用） ───
function qToWmo(t){
  if(t.includes('雷')) return 95; if(t.includes('暴雨')) return 82;
  if(t.includes('大雨')) return 65; if(t.includes('中雨')) return 63;
  if(t.includes('小雨')||t.includes('阵雨')) return 61;
  if(t.includes('暴雪')||t.includes('大雪')) return 75;
  if(t.includes('中雪')) return 73; if(t.includes('小雪')) return 71;
  if(t.includes('雾')||t.includes('霾')) return 45;
  if(t.includes('阴')) return 3; return 2;
}

const SNOW_CODES=[71,73,75,77,85,86];
function uniq(a){return[...new Set(a)]}

// ─── 和风天气获取数据 ───
const Q_KEY='71e27111c4a24035a488264ac63bfa3d';
const Q_HOST='mx2k5qdctg.re.qweatherapi.com';

async function qFetch(path,loc){
  const r=await fetch(`https://${Q_HOST}${path}?location=${loc}&key=${Q_KEY}`);
  if(!r.ok) throw new Error('获取失败');
  return r.json();
}

async function fetchQWeather(lat,lon){
  const loc=`${lon},${lat}`;
  const[nowR,hr24R,d3R,aqiR]=await Promise.all([
    qFetch('/v7/weather/now',loc),
    qFetch('/v7/weather/24h',loc),
    qFetch('/v7/weather/3d',loc),
    fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,us_aqi,pm2_5,pm10`).then(r=>r.ok?r.json():{})
  ]);
  if(nowR.code!=='200'||!nowR.now) throw new Error('数据异常');
  const aqi=aqiR?.current?.european_aqi||null;
  return{now:nowR.now,hourly:hr24R.hourly||[],daily:d3R.daily||[],aqi};
}

function renderQW(data,locName,districtName){
  const now=new Date();const h=now.getHours(),m=now.getMinutes();
  const b=document.getElementById('timeBadge');
  if(h>=4&&h<=8){b.textContent='☀️早安！今日天气已更新';b.className='time-badge morning';}
  else{b.textContent=`🌤更新于 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;b.className='time-badge';}

  const n=data.now;
  const curT=n.temp;
  const wText=n.text;
  const fLike=n.feelsLike;
  const wDir=n.windDir||'';
  const wScale=n.windScale||'';
  const hum=n.humidity||'';
  const icon=wIcon(wText);

  // 每日数据
  const dd=data.daily[0]||{};
  const tMax=dd.tempMax||'--';
  const tMin=dd.tempMin||'--';
  const dText=dd.textDay||wText;

  const aqi=data.aqi;
  let aqiLevel='',aqiColor='';
  if(aqi!==null){
    if(aqi<=50){aqiLevel='优';aqiColor='#2e7d32';}
    else if(aqi<=100){aqiLevel='良';aqiColor='#bf8f00';}
    else if(aqi<=150){aqiLevel='轻度';aqiColor='#d45500';}
    else if(aqi<=200){aqiLevel='中度';aqiColor='#c62828';}
    else if(aqi<=300){aqiLevel='重度';aqiColor='#6a1b9a';}
    else{aqiLevel='严重';aqiColor='#880e4f';}
  }
  const wmo=qToWmo(wText);
  const wSpeed=parseInt(n.windSpeed||'0')||0;
  const hasRain=data.hourly.some(x=>parseInt(x.pop||'0')>=50)||['雨','雷'].some(k=>wText.includes(k));

  // 小时预报
  let hHTML='';
  for(const hr of data.hourly){
    if(hHTML.split('<div class="h-item').length>24) break;
    hHTML+=`<div class="h-item"><div>${hr.fxTime.substring(11,16)}</div><div class="h-i">${wIcon(hr.text)}</div><div class="h-t">${hr.temp}°</div>${parseInt(hr.pop||'0')>=30?`<div class="h-r">💧${hr.pop}%</div>`:''}</div>`;
  }

  // 预警
  const warns=[];
  for(const hr of data.hourly.slice(0,12)){
    const pp=parseInt(hr.pop||'0');
    const txt=hr.text;
    if(txt.includes('暴雨')||txt.includes('大暴雨')){warns.push({level:'red',text:'🚨暴雨红色预警'});break;}
    if(txt.includes('雷暴')||txt.includes('雷阵雨')){warns.push({level:'orange',text:'⛈雷暴橙色预警'});break;}
    if(txt.includes('大雨')){warns.push({level:'orange',text:'🌧大雨橙色预警'});break;}
    if(txt.includes('中雨')||pp>=70){warns.push({level:'yellow',text:`🌧降雨黄色预警：概率${pp}%`});break;}
    if(pp>=50){warns.push({level:'blue',text:`🌦降雨蓝色预警：概率${pp}%`});break;}
  }
  if(parseInt(dd.tempMax||'0')>=40) warns.unshift({level:'red',text:'🔥高温红色预警：最高'+dd.tempMax+'°C'});
  else if(parseInt(dd.tempMax||'0')>=37) warns.unshift({level:'orange',text:'🔥高温橙色预警：最高'+dd.tempMax+'°C'});
  else if(parseInt(dd.tempMax||'0')>=35) warns.unshift({level:'yellow',text:'🌡高温黄色预警：最高'+dd.tempMax+'°C'});

  // 穿搭
  const mD=dressMan(parseInt(tMax||'30'),parseInt(tMin||'20'),wmo,wSpeed,hasRain?1:0);
  const fD=dressWoman(parseInt(tMax||'30'),parseInt(tMin||'20'),wmo,wSpeed,hasRain?1:0);

  document.getElementById('app').innerHTML=`
    <div class="weather-card">
      <div class="weather-loc-wrap"><span class="pin">📍</span><div class="weather-location">${locName}<span class="loc-district">${districtName||''}</span></div></div>
      <div class="weather-main">
        <div><div class="weather-temp">${curT}<span class="deg">°</span><span class="range">↕ <span class="rn">${tMin}</span>° ~ <span class="rn">${tMax}</span>°</span></div></div>
        <div class="weather-icon-wrap"><div class="big-i">${icon}</div></div>
      </div>
      <div class="weather-desc-line"><span class="w-s">${wText}</span><span class="w-t">${curT}°</span><span class="w-f">体感 ${fLike}°C</span></div>
      <div class="weather-extras">
        <div class="ex"><span class="ex-i">💨</span><span>${wDir}</span><span class="ex-v">${wScale}级</span></div>
        <div class="ex"><span class="ex-i">💧</span><span>湿度</span><span class="ex-v">${hum}%</span></div>
        <div class="ex"><span class="ex-i">🌿</span><span>AQI</span><span class="ex-v" style="color:${aqiColor}">${aqi!==null?aqi+' '+aqiLevel:'--'}</span></div>
        <div class="ex"><span class="ex-i">🌅</span><span>日出</span><span class="ex-v">${dd.sunrise||'--'}</span></div>
        <div class="ex"><span class="ex-i">🌇</span><span>日落</span><span class="ex-v">${dd.sunset||'--'}</span></div>
      </div>
      ${hHTML?`<div class="hourly-sect"><div class="hourly-title">⏱ 小时预报</div><div class="hourly-scroll">${hHTML}</div></div>`:''}
      ${warns.map(w=>`<div class="warn-bar ${w.level}">${w.text}</div>`).join('')}
    </div>
    <div class="dressing-sect">
      <div class="dressing-title">👔 今日穿搭推荐</div>
      <div class="gender-tabs"><div class="gender-tab active-male" data-g="male">🧑 男士</div><div class="gender-tab" data-g="female">👩 女士</div></div>
      <div class="rec-card show" id="recMale">
        <div class="style-tabs"><div class="style-tab active-casual" data-s="casual" data-g="male">😎 时髦大咖</div><div class="style-tab" data-s="work" data-g="male">💼 通勤牛马</div></div>
        <div id="mC">${rHTML(mD.casual)}</div><div id="mW" style="display:none">${rHTML(mD.work)}</div>
      </div>
      <div class="rec-card" id="recFemale">
        <div class="style-tabs"><div class="style-tab active-casual" data-s="casual" data-g="female">😎 时髦大咖</div><div class="style-tab" data-s="work" data-g="female">💼 通勤牛马</div></div>
        <div id="fC">${rHTML(fD.casual)}</div><div id="fW" style="display:none">${rHTML(fD.work)}</div>
      </div>
      ${mD.tips.map(t=>`<div class="rec-tip">${t}</div>`).join('')}
    </div>`;

  document.querySelectorAll('.gender-tab').forEach(t=>t.addEventListener('click',()=>{
    const g=t.dataset.g;
    document.querySelectorAll('.gender-tab').forEach(x=>x.className='gender-tab'+(x.dataset.g===g?' active-'+g:''));
    document.getElementById('recMale').classList.toggle('show',g==='male');
    document.getElementById('recFemale').classList.toggle('show',g==='female');
  }));
  document.querySelectorAll('.style-tab').forEach(t=>t.addEventListener('click',()=>{
    const s=t.dataset.s,g=t.dataset.g;
    t.closest('.rec-card').querySelectorAll('.style-tab').forEach(x=>x.className='style-tab'+(x.dataset.s===s?' active-'+s:''));
    const p=g==='male'?'m':'f';
    document.getElementById(p+'C').style.display=s==='casual'?'':'none';
    document.getElementById(p+'W').style.display=s==='work'?'':'none';
  }));
}

// ─── 逆地理编码 ───
async function revGeo(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`);
    const d=await r.json();
    if(d&&d.city){
      const c=d.city.replace(/市$/,'');
      let dist=(d.locality||d.localityInfo?.administrative?.slice(-2)?.[0]?.name||'').replace(/市$/,'');
      if(dist===c) dist='';
      return{c,dist};
    }
  }catch(_){}
  return{c:`${lat.toFixed(1)},${lon.toFixed(1)}`,dist:''};
}

// ─── 主流程 ───
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const CK='wx_city_v2';

navigator.geolocation.getCurrentPosition(async pos=>{
  const{latitude,longitude}=pos.coords;
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>正在查询天气…</div>';
  const c=localStorage.getItem(CK);
  if(c){
    try{const x=JSON.parse(c);document.getElementById('app').innerHTML=`<div class="weather-card"><div class="weather-loc-wrap"><span class="pin">📍</span><div class="weather-location">${x.c||'加载中…'}<span class="loc-district">${x.d||''}</span></div></div><div class="weather-main"><div><div class="weather-temp">--<span class="deg">°</span><span class="range">--°~--°</span></div></div><div class="weather-icon-wrap"><div class="big-i">⏳</div></div></div><div class="weather-desc-line" style="margin:0;padding:20px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div><span style="color:#999">加载天气…</span></div></div>`;}catch(_){}
  }
  const[weather,loc]=await Promise.all([
    fetchQWeather(latitude,longitude),
    revGeo(latitude,longitude).then(l=>{localStorage.setItem(CK,JSON.stringify(l));return l;})
  ]);
  renderQW(weather,loc.c,loc.dist);
},err=>{
  const c=localStorage.getItem(CK);
  let cn='',dn='';
  if(c){try{const x=JSON.parse(c);cn=x.c;dn=x.d;}catch(_){}}
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>定位失败，使用上次位置…</div>';
  fetchQWeather(36.45,115.98).then(w=>renderQW(w,cn||'聊城',dn?dn+'（默认）':'（默认）'))
  .catch(()=>{document.getElementById('app').innerHTML=`<div class="error-card"><div>😅 定位失败</div><button class="retry" onclick="location.reload()">重试</button></div>`;});
},{enableHighAccuracy:false,timeout:6000});
</script>
