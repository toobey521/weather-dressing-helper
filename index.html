// ─── 中国天气网天气描述→图标 ───
function cnIcon(w){
  const m={'晴':'☀️','多云':'⛅️','少云':'🌤','阴':'☁️','阴天':'☁️',
    '小雨':'🌦','中雨':'🌧','大雨':'🌧','暴雨':'🌧','大暴雨':'🌧',
    '雷阵雨':'⛈','雷暴':'⛈','冰雹':'🌨',
    '小雪':'🌨','中雪':'🌨','大雪':'❄️','暴雪':'❄️',
    '雾':'🌫','霾':'🌫','扬沙':'💨','浮尘':'💨'};
  for(const [k,v] of Object.entries(m)){if(w.includes(k)) return v;}
  return '🌤';
}

// ─── 天气描述→WMO（适配穿搭引擎） ───
function cnToWmo(weatherStr){
  const w=weatherStr||'';
  if(w.includes('雷')) return 95;
  if(w.includes('暴雨')||w.includes('特大')) return 82;
  if(w.includes('大雨')) return 65;
  if(w.includes('中雨')||w.includes('毛毛雨')) return 63;
  if(w.includes('小雨')||w.includes('阵雨')) return 61;
  if(w.includes('暴雪')||w.includes('大雪')) return 75;
  if(w.includes('中雪')) return 73;
  if(w.includes('小雪')||w.includes('阵雪')) return 71;
  if(w.includes('雾')||w.includes('霾')) return 45;
  if(w.includes('阴')) return 3;
  if(w.includes('多云')||w.includes('少云')||w.includes('晴')) return 2;
  return 0;
}

// ─── 中国天气网获取数据 ───
async function fetchChinaWeather(cityCode){
  const skUrl=`https://d1.weather.com.cn/sk_2d/${cityCode}.html`;
  const dzUrl=`https://d1.weather.com.cn/dingzhi/${cityCode}.html`;
  const [skResp,dzResp]=await Promise.all([
    fetch(skUrl,{headers:{'Referer':'https://www.weather.com.cn/'}}),
    fetch(dzUrl,{headers:{'Referer':'https://www.weather.com.cn/'}})
  ]);
  const skText=await skResp.text();
  const dzText=await dzResp.text();
  const sk=JSON.parse(skText.replace('var dataSK=','').replace(/;\s*$/,''));
  const dzMatch=dzText.match(/cityDZ\d+=\s*(\{.*?\})\s*;/);
  const alarmMatch=dzText.match(/alarmDZ\d+=\s*(\{.*?\})\s*;?\s*$/);
  if(!dzMatch) throw new Error('解析失败');
  const dz=JSON.parse(dzMatch[1]);
  const alarm=alarmMatch?JSON.parse(alarmMatch[1]):{w:[]};
  return {sk,dz,alarm};
}

// ─── 逆地理编码 ───
async function reverseGeo(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`);
    const d=await r.json();
    if(d&&d.city){
      const city=d.city.replace(/市$/,'');
      let district=(d.locality||d.localityInfo?.administrative?.slice(-2)?.[0]?.name||d.principalSubdivision||'').replace(/市$/,'');
      if(district===city) district='';
      return {city,district};
    }
  }catch(_){}
  try{
    const r2=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=12&accept-language=zh`);
    const d2=await r2.json();
    const a=d2?.address||{};
    let c=a.city||a.county||a.state_district||'';
    let d=a.suburb||a.town||a.county||'';
    if(d===c) d=''; c=c.replace(/市$/,'');
    if(c) return {city:c,district:d};
  }catch(_){}
  return {city:`${lat.toFixed(1)},${lon.toFixed(1)}`,district:''};
}

  if(rec.shoes.length) h+=`<div class="rec-section"><div class="rec-label">👟鞋子</div><div class="rec-items">${rec.shoes.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;

}

// ─── 渲染（中国天气网数据） ───
function renderCNWeather({sk,dz,alarm}, locName, districtName){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes();
  const badge=document.getElementById('timeBadge');
  if(h>=4&&h<=8){badge.textContent='☀️早安！今日天气已更新';badge.className='time-badge morning';}
  else{badge.textContent=`🌤更新于 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;badge.className='time-badge';}

  // 实时数据
  const curTemp=sk.temp;
  const weatherCN=sk.weather;
  const windDir=sk.WD||'';
  const windLevel=sk.WS||'';
  const humidity=sk.SD||'';
  const aqi=sk.aqi||'';
  const rain24=sk.rain24h||'0';

  // 预报数据
  const f=dz.weatherinfo;
  const tHigh=(f.temp||'').replace('℃','');
  const tLow=(f.tempn||'').replace('℃','');
  const forecastWeather=f.weather||'';
  const fWind=f.wd||'';
  const fWindLevel=f.ws||'';

  // WMO码（给穿搭引擎）
  const wmoCode=cnToWmo(forecastWeather);
  const hasRain=RAIN_CODES.includes(wmoCode);
  const windNum=parseInt(windLevel)||0;

  // 预警
  const alarmHtml=(alarm.w||[]).map(a=>{
    const level=a.w1||'';
    let cls='blue';
    if(level.includes('红')||level.includes('红色')) cls='red';
    else if(level.includes('橙')||level.includes('橙色')) cls='orange';
    else if(level.includes('黄')||level.includes('黄色')) cls='yellow';
    return `<div class="alert-bar ${cls}">⚠️${a.w2||'天气预警'}：${a.w3||''}（${level}）</div>`;
  }).join('');

  // 穿搭
  const avgT=(parseInt(tHigh||30)+parseInt(tLow||20))/2;
  const mRec=dressMan(parseInt(tHigh||30),parseInt(tLow||20),wmoCode,windNum,hasRain?1:0);
  const fRec=dressWoman(parseInt(tHigh||30),parseInt(tLow||20),wmoCode,windNum,hasRain?1:0);

  document.getElementById('app').innerHTML=`
    <div class="weather-card">
      <div class="weather-location">${locName}<span class="loc-district">${districtName||''}</span></div>
      <div class="weather-main">
        <div>
          <div class="weather-temp">${curTemp}°<span class="range">↕ ${tLow}° ~ ${tHigh}°</span></div>
        </div>
        <div class="weather-icon">${cnIcon(weatherCN)}</div>
      </div>
      <div class="weather-desc">${weatherCN} · 实时 ${curTemp}°C</div>
      <div class="weather-extras">
        <span>💨 ${windDir} ${windLevel}</span>
        <span>💧 ${humidity}</span>
        <span>🌬 ${aqi!=='0'?'AQI '+aqi:''}</span>
        <span>🌅 ${sk.time||''}</span>
      </div>
      ${alarmHtml}
      <div style="margin-top:12px;padding:12px;background:#f8f9fc;border-radius:12px;font-size:13px;color:var(--text2);line-height:1.8">
        <div>📋 今日概况：${forecastWeather} · ${fWind}${fWindLevel}</div>
        <div>🌡 ${tLow}°C ~ ${tHigh}°C · 降水量 ${rain24}mm</div>
      </div>
    </div>

    <div class="dressing-sect">
      <div class="dressing-title">👔 今日穿搭推荐</div>
      <div class="gender-tabs">
        <div class="gender-tab active-male" data-gender="male">🧑 男士</div>
        <div class="gender-tab" data-gender="female">👩 女士</div>
      </div>
      <div class="rec-card show" id="recMale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="male">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="male">💼 通勤牛马</div>
        </div>
        <div id="maleCasual">${renderRecHTML(mRec.casual)}</div>
        <div id="maleWork" style="display:none">${renderRecHTML(mRec.work)}</div>
      </div>
      <div class="rec-card" id="recFemale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="female">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="female">💼 通勤牛马</div>
        </div>
        <div id="femaleCasual">${renderRecHTML(fRec.casual)}</div>
        <div id="femaleWork" style="display:none">${renderRecHTML(fRec.work)}</div>
      </div>
      ${mRec.tips.map(t=>`<div class="rec-tip">${t}</div>`).join('')}
    </div>`;

  // tab切换
  document.querySelectorAll('.gender-tab').forEach(t=>t.addEventListener('click',()=>{
    const g=t.dataset.gender;
    document.querySelectorAll('.gender-tab').forEach(x=>x.className='gender-tab'+(x.dataset.gender===g?' active-'+g:''));
    document.getElementById('recMale').classList.toggle('show',g==='male');
    document.getElementById('recFemale').classList.toggle('show',g==='female');
  }));
  document.querySelectorAll('.style-tab').forEach(t=>t.addEventListener('click',()=>{
    const s=t.dataset.style, g=t.dataset.gender;
    t.closest('.rec-card').querySelectorAll('.style-tab').forEach(x=>x.className='style-tab'+(x.dataset.style===s?' active-'+s:''));
    const p=g==='male'?'male':'female';
    document.getElementById(p+'Casual').style.display=s==='casual'?'':'none';
    document.getElementById(p+'Work').style.display=s==='work'?'':'none';
  }));
}

document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const CACHE_KEY='wx_city_v1';

navigator.geolocation.getCurrentPosition(async pos=>{
  const {latitude,longitude}=pos.coords;
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>正在查询天气…</div>';

  // 先显示缓存的城市场名
  const cached=localStorage.getItem(CACHE_KEY);
  if(cached){
    try{
      const c=JSON.parse(cached);
      document.getElementById('app').innerHTML=`
        <div class="weather-card">
          <div class="weather-location">${c.city||'加载中…'}<span class="loc-district">${c.district||''}</span></div>
          <div class="weather-main">
            <div><div class="weather-temp">--°<span class="range">--°~--°</span></div></div>
            <div class="weather-icon">⏳</div>
          </div>
          <div class="weather-desc">数据加载中…</div>
        </div>
        <div class="loading" style="padding:30px"><div class="spinner"></div><div>获取天气数据…</div></div>`;
    }catch(_){}
  }

  // 并行：逆地理编码 + 天气查询
  const [loc]=await Promise.all([
    reverseGeo(latitude,longitude).then(l=>{localStorage.setItem(CACHE_KEY,JSON.stringify(l));return l;})
  ]);

  // 查城市编码
  const cityCode=CITY_CODES[loc.city];
  if(!cityCode){
    // 城市不在映射表中，尝试模糊匹配
    const match=Object.entries(CITY_CODES).find(([k])=>loc.city.includes(k)||k.includes(loc.city));
    if(match){
      try{
        const w=await fetchChinaWeather(match[1]);
        renderCNWeather(w, loc.city, loc.district);
        return;
      }catch(_){}
    }
    showError(`暂未收录${loc.city}的天气数据`);
    return;
  }
  try{
    const weather=await fetchChinaWeather(cityCode);
    renderCNWeather(weather, loc.city, loc.district);
  }catch(e){
    showError('天气数据获取失败');
  }
}, err=>{
  const cached=localStorage.getItem(CACHE_KEY);
  let cityName='',districtName='';
  if(cached){try{const c=JSON.parse(cached);cityName=c.city;districtName=c.district;}catch(_){}}
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>定位失败，使用上次位置…</div>';
  const defCode=cityName&&CITY_CODES[cityName]?CITY_CODES[cityName]:'101121701';
  const defCity=cityName||'聊城';
  fetchChinaWeather(defCode).then(w=>{
    renderCNWeather(w, defCity, districtName?districtName+'（默认）':'（默认）');
  }).catch(()=>showError('定位失败，请检查网络'));
},{enableHighAccuracy:false,timeout:6000});

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="error-card">
      <div>😅 ${msg}</div>
      <button class="retry" onclick="location.reload()">重新获取</button>
    </div>`;
}
</script>
</body>
</html>
