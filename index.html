<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日天气 · 穿搭助手</title>
<style>
  :root{--bg:#f0f4f8;--card:#fff;--text:#1a1a2e;--text2:#555;--male:#4a90d9;--female:#e8598b;--casual:#f0b34b;--work:#6c5ce7;--shadow:0 8px 32px rgba(0,0,0,0.08);--radius:20px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
  .container{max-width:480px;width:100%}
  .header{text-align:center;padding:24px 0 16px}
  .header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--male),var(--female));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .sub{color:var(--text2);font-size:13px;margin-top:4px}
  .header .time-badge{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;background:#e8ecf1;color:#666}
  .header .time-badge.morning{background:linear-gradient(135deg,#fdf6e3,#fce4b8);color:#b8860b}
  .loading{text-align:center;padding:60px 20px;color:#999}
  .loading .spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:var(--male);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-card{background:#fff5f5;border:1px solid #ffd7d7;border-radius:var(--radius);padding:24px;text-align:center;color:#c53030;margin-top:20px}
  .error-card .retry{display:inline-block;margin-top:12px;padding:8px 24px;background:#c53030;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer}
  .weather-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-top:8px}
  .weather-location{font-size:20px;font-weight:600}
  .weather-location .loc-district{font-size:14px;font-weight:400;color:var(--text2);margin-left:6px}
  .weather-main{display:flex;align-items:center;justify-content:space-between;margin:14px 0}
  .weather-temp{font-size:52px;font-weight:700;line-height:1}
  .weather-temp .range{font-size:16px;font-weight:400;color:var(--text2);display:block;margin-top:4px}
  .weather-icon{font-size:56px;line-height:1}
  .weather-desc{font-size:16px;color:var(--text2);margin-top:2px}
  .weather-extras{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #eee;font-size:13px;color:var(--text2)}
  .weather-extras span{display:flex;align-items:center;gap:4px}
  .dressing-sect{margin-top:16px}
  .dressing-title{font-size:15px;font-weight:600;margin-bottom:10px}
  .gender-tabs{display:flex;gap:8px;margin-bottom:10px}
  .gender-tab{flex:1;padding:10px;text-align:center;border-radius:12px;border:2px solid transparent;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;background:#f5f7fa;color:#999}
  .gender-tab.active-male{background:#e8f0fe;border-color:var(--male);color:var(--male)}
  .gender-tab.active-female{background:#fde8ef;border-color:var(--female);color:var(--female)}
  .style-tabs{display:flex;gap:6px;margin-bottom:10px}
  .style-tab{flex:1;padding:7px;text-align:center;border-radius:10px;border:1.5px solid transparent;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;background:#f8f8f8;color:#aaa}
  .style-tab.active-casual{background:#fff8e8;border-color:var(--casual);color:#b8860b}
  .style-tab.active-work{background:#f0ecfe;border-color:var(--work);color:#5a4ab0}
  .rec-card{display:none}
  .rec-card.show{display:block}
  .rec-section{margin-bottom:12px}
  .rec-section:last-child{margin-bottom:0}
  .rec-label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;margin-bottom:5px}
  .rec-items{display:flex;flex-wrap:wrap;gap:6px}
  .rec-tag{padding:5px 12px;border-radius:8px;font-size:14px;background:rgba(255,255,255,.8);border:1px solid #e0e0e0;white-space:nowrap}
  .rec-tip{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;background:#fffbe6;border:1px solid #f0e6b8;color:#8a6d0b}
  .rec-tip.hot{background:#fff0e8;border-color:#f0c8b8;color:#8a3a1a}
  .rec-tip.cold{background:#f0f0ff;border-color:#c8c8f0;color:#3a3a6a}
  .hourly-sect{margin-top:14px}
  .hourly-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
  .hourly-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
  .hourly-scroll::-webkit-scrollbar{height:3px}
  .hourly-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
  .h-item{flex-shrink:0;width:56px;text-align:center;padding:6px 2px;border-radius:10px;background:#f8f9fc;border:1px solid #eee;font-size:11px}
  .h-item .h-icon{font-size:18px;margin:2px 0}
  .h-item .h-temp{font-size:13px;font-weight:600}
  .h-item .h-rain{font-size:10px;color:#4a90d9}
  .warn-bar{margin-top:8px;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:500;line-height:1.5}
  .warn-bar.red{background:#fff0f0;border:1px solid #ffb0b0;color:#c00}
  .warn-bar.orange{background:#fff3e0;border:1px solid #f0c080;color:#c60}
  .warn-bar.yellow{background:#fffde0;border:1px solid #f0e080;color:#880}
  .warn-bar.blue{background:#e8f4fd;border:1px solid #b0c8f0;color:#158}
  .footer{text-align:center;padding:20px;font-size:11px;color:#bbb}
  @media(max-width:420px){body{padding:12px}.weather-card{padding:16px}.weather-temp{font-size:42px}.weather-icon{font-size:44px}}
</style>
</head>

function windLevel(kmh){
  if(kmh<1) return '0级'; if(kmh<6) return '1级'; if(kmh<12) return '2级';

}
function windDir(deg){
  if(deg==null) return '';

}

// ─── 天气获取 ───
async function fetchWeather(lat,lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max,sunrise,sunset&hourly=temperature_2m,weathercode,precipitation_probability,precipitation,windspeed_10m,relative_humidity_2m&timezone=auto&forecast_days=1`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('天气获取失败');
  return r.json();
}

// ─── 逆地理编码 ───
async function reverseGeo(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`);
    const d=await r.json();
    if(d&&d.city){
      const city=d.city.replace(/市$/,'');
      let dist=(d.locality||d.localityInfo?.administrative?.slice(-2)?.[0]?.name||d.principalSubdivision||'').replace(/市$/,'');
      if(dist===city) dist='';
      return{city,district:dist};
    }
  }catch(_){}
  try{
    const r2=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=12&accept-language=zh`);
    const d2=await r2.json();
    const a=d2?.address||{};let c=a.city||a.county||a.state_district||'';let d=a.suburb||a.town||a.county||'';
    if(d===c)d='';c=c.replace(/市$/,'');if(c)return{city:c,district:d};
  }catch(_){}
  return{city:`${lat.toFixed(1)},${lon.toFixed(1)}`,district:''};
}

// ─── 渲染 ───
function renderWeather(data,locName,districtName){
  const now=new Date();const h=now.getHours(),m=now.getMinutes();
  const badge=document.getElementById('timeBadge');
  if(h>=4&&h<=8){badge.textContent='☀️早安！今日天气已更新';badge.className='time-badge morning';}
  else{badge.textContent=`🌤更新于 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;badge.className='time-badge';}

  const hData=data.hourly;
  let curIdx=hData.time.findIndex(t=>new Date(t).getHours()===h);
  if(curIdx<0) curIdx=hData.time.findIndex(t=>new Date(t).getHours()===h+1);
  if(curIdx<0) curIdx=0;

  const wc=hData.weathercode[curIdx];
  const w=wmoInfo(wc);
  const curTemp=Math.round(hData.temperature_2m[curIdx]);
  const humidity=hData.relative_humidity_2m?.[curIdx]||'--';
  const curWindKMH=Math.round(hData.windspeed_10m[curIdx]||0);
  const curPrecip=hData.precipitation[curIdx]||0;
  const windDirDeg=hData.winddirection_10m?.[curIdx];
  const tMax=Math.round(data.daily.temperature_2m_max[0]);
  const tMin=Math.round(data.daily.temperature_2m_min[0]);
  const maxWindKMH=Math.round(data.daily.windspeed_10m_max[0]||0);
  const dailyPrecip=data.daily.precipitation_sum[0]||0;
  const sunrise=data.daily.sunrise?.[0]?.split('T')[1]||'';
  const sunset=data.daily.sunset?.[0]?.split('T')[1]||'';

  // 体感温度
  const feelsLike = curTemp;

  // 小时预报HTML
  let hourHTML='';
  for(let i=0;i<hData.time.length;i++){
    const ht=new Date(hData.time[i]);
    const hr=ht.getHours();
    if(hr<h-1) continue;
    if(hr>22) break;
    if(hourHTML.split('<div class="h-item').length>16) break;
    const hTemp=Math.round(hData.temperature_2m[i]);
    const hWc=hData.weathercode[i];
    const hWi=wmoInfo(hWc);
    const hPP=hData.precipitation_probability?.[i]||0;
    hourHTML+=`<div class="h-item">
      <div>${String(hr).padStart(2,'0')}:00</div>
      <div class="h-icon">${hWi.icon}</div>
      <div class="h-temp">${hTemp}°</div>
      ${hPP>=30?`<div class="h-rain">💧${hPP}%</div>`:''}
    </div>`;
  }

  // 预警生成
  const warns=[];
  // 降雨预警
  for(let i=curIdx;i<hData.time.length&&i<curIdx+8;i++){
    const pp=hData.precipitation_probability?.[i]||0;
    const precip=hData.precipitation[i]||0;
    const wcc=hData.weathercode[i];
    if(precip>=50){warns.push({level:'red',text:`🚨暴雨红色预警：${Math.round(precip)}mm强降水`});break;}
    if(wcc===95||wcc===96||wcc===99){warns.push({level:'orange',text:'⛈雷暴橙色预警：注意防雷避险'});break;}
    if(precip>=25){warns.push({level:'orange',text:`🌧暴雨橙色预警：${Math.round(precip)}mm强降雨`});break;}
    if(RAIN.includes(wcc)||pp>=70){warns.push({level:'yellow',text:`🌧降雨黄色预警：降雨概率${Math.round(pp)}%，出门带伞`});break;}
    if(pp>=50){warns.push({level:'blue',text:`🌦降雨蓝色预警：降雨概率${Math.round(pp)}%`});break;}
  }
  // 高温预警
  if(tMax>=40) warns.push({level:'red',text:`🔥高温红色预警：最高${tMax}°C，避免户外活动`});
  else if(tMax>=37) warns.push({level:'orange',text:`🔥高温橙色预警：最高${tMax}°C，注意防暑`});
  else if(tMax>=35) warns.push({level:'yellow',text:`🌡高温黄色预警：最高${tMax}°C，注意防晒`});
  // 大风预警
  if(maxWindKMH>=75) warns.push({level:'red',text:`💨大风红色预警：最大风速${maxWindKMH}km/h`});
  else if(maxWindKMH>=62) warns.push({level:'orange',text:`💨大风橙色预警：最大风速${maxWindKMH}km/h`});
  else if(maxWindKMH>=50) warns.push({level:'yellow',text:`💨大风黄色预警：最大风速${maxWindKMH}km/h`});
  else if(maxWindKMH>=39) warns.push({level:'blue',text:`💨大风蓝色预警：最大风速${maxWindKMH}km/h`});
  // 低温/大雪预警
  if(tMin<=-10){warns.push({level:'red',text:`❄️寒潮红色预警：最低${tMin}°C`});}
  else if(tMin<=-5&&SNOW.includes(wc)){warns.push({level:'orange',text:'❄️暴雪橙色预警'});}
  else if(tMin<=0&&SNOW.includes(wc)){warns.push({level:'yellow',text:'❄️降雪黄色预警：注意防滑'});}

  // 穿搭
  const mRec=dressMan(tMax,tMin,wc,curWindKMH,dailyPrecip);
  const fRec=dressWoman(tMax,tMin,wc,curWindKMH,dailyPrecip);

  document.getElementById('app').innerHTML=`
    <div class="weather-card">
      <div class="weather-location">${locName}<span class="loc-district">${districtName||''}</span></div>
      <div class="weather-main">
        <div><div class="weather-temp">${curTemp}°<span class="range">↕ ${tMin}° ~ ${tMax}°</span></div></div>
        <div class="weather-icon">${w.icon}</div>
      </div>
      <div class="weather-desc">${w.label} · 体感 ${feelsLike}°C</div>
      <div class="weather-extras">
        <span>💨 ${windDir(windDirDeg)} ${windLevel(curWindKMH)}</span>
        <span>💧 ${humidity}%</span>
        ${sunrise?`<span>🌅 ${sunrise}</span>`:''}
        ${sunset?`<span>🌇 ${sunset}</span>`:''}
      </div>
      ${hourHTML?`
      <div class="hourly-sect">
        <div class="hourly-title">⏱ 小时预报</div>
        <div class="hourly-scroll">${hourHTML}</div>
      </div>`:''}
      ${warns.map(w=>`<div class="warn-bar ${w.level}">${w.text}</div>`).join('')}
    </div>
    <div class="dressing-sect">
      <div class="dressing-title">👔 今日穿搭推荐</div>
      <div class="gender-tabs">
        <div class="gender-tab active-male" data-gender="male">🧑 男士</div>
        <div class="gender-tab" data-gender="female">👩 女士</div>
      </div>
      <div class="rec-card show" id="recMale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="male">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="male">💼 通勤牛马</div>
        </div>
        <div id="maleCasual">${renderRecHTML(mRec.casual)}</div>
        <div id="maleWork" style="display:none">${renderRecHTML(mRec.work)}</div>
      </div>
      <div class="rec-card" id="recFemale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="female">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="female">💼 通勤牛马</div>
        </div>
        <div id="femaleCasual">${renderRecHTML(fRec.casual)}</div>
        <div id="femaleWork" style="display:none">${renderRecHTML(fRec.work)}</div>
      </div>
      ${mRec.tips.map(t=>`<div class="rec-tip">${t}</div>`).join('')}
    </div>`;

  document.querySelectorAll('.gender-tab').forEach(t=>t.addEventListener('click',()=>{
    const g=t.dataset.gender;
    document.querySelectorAll('.gender-tab').forEach(x=>x.className='gender-tab'+(x.dataset.gender===g?' active-'+g:''));
    document.getElementById('recMale').classList.toggle('show',g==='male');
    document.getElementById('recFemale').classList.toggle('show',g==='female');
  }));
  document.querySelectorAll('.style-tab').forEach(t=>t.addEventListener('click',()=>{
    const s=t.dataset.style,g=t.dataset.gender;
    t.closest('.rec-card').querySelectorAll('.style-tab').forEach(x=>x.className='style-tab'+(x.dataset.style===s?' active-'+s:''));
    const p=g==='male'?'male':'female';
    document.getElementById(p+'Casual').style.display=s==='casual'?'':'none';
    document.getElementById(p+'Work').style.display=s==='work'?'':'none';
  }));
}

// ─── 主流程 ───
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const CACHE_KEY='wx_city_v1';

navigator.geolocation.getCurrentPosition(async pos=>{
  const{latitude,longitude}=pos.coords;
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>正在查询天气…</div>';
  const cached=localStorage.getItem(CACHE_KEY);
  if(cached){
    try{
      const c=JSON.parse(cached);
      document.getElementById('app').innerHTML=`
        <div class="weather-card">
          <div class="weather-location">${c.city||'加载中…'}<span class="loc-district">${c.district||''}</span></div>
          <div class="weather-main"><div><div class="weather-temp">--°<span class="range">--°~--°</span></div></div><div class="weather-icon">⏳</div></div>
          <div class="weather-desc">数据加载中…</div>
        </div>
        <div class="loading" style="padding:30px"><div class="spinner"></div><div>获取天气数据…</div></div>`;
    }catch(_){}
  }
  const[weather,loc]=await Promise.all([
    fetchWeather(latitude,longitude),
    reverseGeo(latitude,longitude).then(l=>{localStorage.setItem(CACHE_KEY,JSON.stringify(l));return l;})
  ]);
  renderWeather(weather,loc.city,loc.district);
},err=>{
  const cached=localStorage.getItem(CACHE_KEY);
  let c='',d='';
  if(cached){try{const x=JSON.parse(cached);c=x.city;d=x.district;}catch(_){}}
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>定位失败，使用上次位置…</div>';
  const defLat=36.45,defLon=115.98;
  fetchWeather(defLat,defLon).then(w=>renderWeather(w,c||'当前位置',d?d+'（默认）':'（默认）'))
  .catch(()=>showError('定位失败，请允许定位或检查网络'));
},{enableHighAccuracy:false,timeout:6000});

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="error-card"><div>😅 ${msg}</div><button class="retry" onclick="location.reload()">重新获取</button></div>`;}
</script>
