<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日天气 · 穿搭助手</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a2e;
    --text2: #555;
    --accent: #4a90d9;
    --accent2: #ff6b6b;
    --male: #4a90d9;
    --female: #e8598b;
    --casual: #f0b34b;
    --work: #6c5ce7;
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .container { max-width: 480px; width: 100%; }

  /* header */
  .header { text-align: center; padding: 24px 0 16px; }
  .header h1 {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, var(--male), var(--female));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header .sub { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .header .time-badge {
    display: inline-block; margin-top: 8px; padding: 4px 14px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
    background: #e8ecf1; color: #666;
  }
  .header .time-badge.morning {
    background: linear-gradient(135deg, #fdf6e3, #fce4b8); color: #b8860b;
  }

  /* loading & error */
  .loading { text-align: center; padding: 60px 20px; color: #999; }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0e0e0; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-card {
    background: #fff5f5; border: 1px solid #ffd7d7;
    border-radius: var(--radius); padding: 24px;
    text-align: center; color: #c53030; margin-top: 20px;
  }
  .error-card .retry {
    display: inline-block; margin-top: 12px; padding: 8px 24px;
    background: #c53030; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; cursor: pointer;
  }
  .error-card .retry:active { opacity: 0.8; }

  /* weather main card */
  .weather-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px; margin-top: 8px;
  }
  .weather-location { font-size: 20px; font-weight: 600; }
  .weather-location .loc-district { font-size: 14px; font-weight: 400; color: var(--text2); margin-left: 6px; }
  .weather-main { display: flex; align-items: center; justify-content: space-between; margin: 14px 0; }
  .weather-temp { font-size: 52px; font-weight: 700; line-height: 1; }
  .weather-temp .range { font-size: 16px; font-weight: 400; color: var(--text2); display: block; margin-top: 4px; }
  .weather-icon { font-size: 56px; line-height: 1; }
  .weather-desc { font-size: 16px; color: var(--text2); margin-top: 2px; }
  .weather-extras {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee;
    font-size: 13px; color: var(--text2);
  }
  .weather-extras span { display: flex; align-items: center; gap: 4px; }

  /* hourly timeline */
  .hourly-section { margin-top: 16px; }
  .hourly-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px;
    scrollbar-width: thin; -webkit-overflow-scrolling: touch;
  }
  .hourly-scroll::-webkit-scrollbar { height: 4px; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  .hour-item {
    flex-shrink: 0; width: 64px; text-align: center;
    padding: 8px 4px; border-radius: 12px; background: #f8f9fc;
    border: 1px solid #eee;
  }
  .hour-item.rain-alert { background: #e8f4fd; border-color: #b8d4f0; }
  .hour-item .h-time { font-size: 11px; color: #999; font-weight: 600; }
  .hour-item .h-icon { font-size: 20px; margin: 4px 0; }
  .hour-item .h-temp { font-size: 13px; font-weight: 600; }
  .hour-item .h-rain { font-size: 10px; color: #4a90d9; margin-top: 2px; }
  .hour-item .h-wind { font-size: 10px; color: #888; }

  /* weather alerts */
  .alert-bar {
    margin-top: 12px; padding: 10px 14px; border-radius: 10px;
    font-size: 13px; line-height: 1.6;
  }
  .alert-bar.rain { background: #e8f4fd; border: 1px solid #b8d4f0; color: #1a5a8a; }
  .alert-bar.wind { background: #fef3e2; border: 1px solid #f0d8a0; color: #8a6a1a; }
  .alert-bar.cold { background: #f0f0ff; border: 1px solid #c8c8f0; color: #3a3a6a; }
  .alert-bar.hot { background: #fff0e8; border: 1px solid #f0c8b8; color: #8a3a1a; }
  .alert-bar.snow { background: #f0f8ff; border: 1px solid #c0d8f0; color: #2a4a7a; }

  /* dressing */
  .dressing-sect { margin-top: 16px; }
  .dressing-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .gender-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .gender-tab {
    flex: 1; padding: 10px; text-align: center; border-radius: 12px;
    border: 2px solid transparent; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; background: #f5f7fa; color: #999;
  }
  .gender-tab.active-male { background: #e8f0fe; border-color: var(--male); color: var(--male); }
  .gender-tab.active-female { background: #fde8ef; border-color: var(--female); color: var(--female); }

  .style-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .style-tab {
    flex: 1; padding: 7px; text-align: center; border-radius: 10px;
    border: 1.5px solid transparent; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; background: #f8f8f8; color: #aaa;
  }
  .style-tab.active-casual { background: #fff8e8; border-color: var(--casual); color: #b8860b; }
  .style-tab.active-work { background: #f0ecfe; border-color: var(--work); color: #5a4ab0; }

  .rec-card { display: none; }
  .rec-card.show { display: block; }
  .rec-section { margin-bottom: 12px; }
  .rec-section:last-child { margin-bottom: 0; }
  .rec-label {
    font-size: 12px; font-weight: 600; color: var(--text2);
    letter-spacing: 0.5px; margin-bottom: 5px;
  }
  .rec-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .rec-tag {
    padding: 5px 12px; border-radius: 8px; font-size: 14px;
    background: rgba(255,255,255,0.8); border: 1px solid #e0e0e0; white-space: nowrap;
  }
  .rec-tip {
    margin-top: 10px; padding: 10px 14px; border-radius: 10px;
    font-size: 13px; line-height: 1.6;
    background: #fffbe6; border: 1px solid #f0e6b8; color: #8a6d0b;
  }

  .footer { text-align: center; padding: 20px; font-size: 11px; color: #bbb; }

  @media (max-width: 420px) {
    body { padding: 12px; }
    .weather-card { padding: 16px; }
    .weather-temp { font-size: 42px; }
    .weather-icon { font-size: 44px; }
    .hour-item { width: 56px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>☀️ 每日穿搭-Toobey</h1>

</div>

<script>
const WMO = {
  0:{icon:'☀️',label:'晴天'},1:{icon:'🌤',label:'少云'},2:{icon:'⛅️',label:'多云'},3:{icon:'☁️',label:'阴天'},
  45:{icon:'🌫',label:'雾'},48:{icon:'🌫',label:'浓雾'},
  51:{icon:'🌦',label:'小毛毛雨'},53:{icon:'🌦',label:'毛毛雨'},55:{icon:'🌧',label:'大毛毛雨'},
  56:{icon:'🌧',label:'冻毛毛雨'},57:{icon:'🌧',label:'冻雨'},
  61:{icon:'🌦',label:'小雨'},63:{icon:'🌧',label:'中雨'},65:{icon:'🌧',label:'大雨'},
  66:{icon:'🌧',label:'冻雨'},67:{icon:'🌧',label:'大冻雨'},
  71:{icon:'🌨',label:'小雪'},73:{icon:'🌨',label:'中雪'},75:{icon:'❄️',label:'大雪'},77:{icon:'❄️',label:'雪粒'},

  85:{icon:'🌨',label:'小阵雪'},86:{icon:'❄️',label:'大阵雪'},
  95:{icon:'⛈',label:'雷暴'},96:{icon:'⛈',label:'雷暴+冰雹'},99:{icon:'⛈',label:'强雷暴+冰雹'}
};
const RAIN_CODES=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
const SNOW_CODES=[71,73,75,77,85,86];
function wmoInfo(c){return WMO[c]||{icon:'🌤',label:'未知'}}
function uniq(a){return[...new Set(a)]}

// ─── 天气预警提示 ───
function buildAlerts(hourly, dailyMaxWind, dailyPrecip, wCode){
  let alerts=[];
  const now=new Date(), h=now.getHours();
  // 检查未来几小时是否有雨
  const rainHours=[];
  for(let i=0;i<hourly.time.length;i++){
    const ht=new Date(hourly.time[i]);
    if(ht.getHours()<h) continue;
    if(ht.getHours()>22) break;
    const wc=hourly.weathercode[i], pp=hourly.precipitation_probability?.[i]||0;
    if(RAIN_CODES.includes(wc)||pp>=50){
      rainHours.push({hour:ht.getHours(),wc,prob:pp,precip:hourly.precipitation[i]});
    }
  }
  if(rainHours.length){
    const first=rainHours[0], last=rainHours[rainHours.length-1];
    let msg;
    if(rainHours.length===1) msg=`🌧 ${first.hour}点左右开始下雨，概率${first.prob}%`;
    else msg=`🌧 ${first.hour}:00~${last.hour}:00有雨，${rainHours.filter(r=>r.prob>=70).length>0?'大概率中到大雨':'有间歇性降雨'}`;
    alerts.push({type:'rain',msg});
  }
  // 大风
  if(dailyMaxWind>=40) alerts.push({type:'wind',msg:`💨 今天风大，最大风速${Math.round(dailyMaxWind)}km/h，注意防风`});
  else if(dailyMaxWind>=25) alerts.push({type:'wind',msg:`💨 风力较强（约${Math.round(dailyMaxWind)}km/h），户外注意`});
  // 高温
  const avgTemp = (Math.max(...hourly.temperature_2m)+Math.min(...hourly.temperature_2m))/2;
  const maxT = Math.max(...hourly.temperature_2m);
  if(maxT>=35) alerts.push({type:'hot',msg:'🥵 高温预警！最高'+Math.round(maxT)+'°C，注意防暑降温'});
  else if(maxT>=30) alerts.push({type:'hot',msg:'🔥 今天较热，最高'+Math.round(maxT)+'°C，注意防晒补水'});
  if(avgTemp<=5) alerts.push({type:'cold',msg:'🥶 气温偏低，注意保暖防寒'});
  if(SNOW_CODES.includes(wCode)) alerts.push({type:'snow',msg:'❄️ 今天有雪，注意防滑保暖'});
  return alerts;
}

function renderRecHTML(rec){
  let h='';
  if(rec.top.length) h+=`<div class="rec-section"><div class="rec-label">👕 上身</div><div class="rec-items">${rec.top.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;
  if(rec.bottom.length) h+=`<div class="rec-section"><div class="rec-label">👖 下身</div><div class="rec-items">${rec.bottom.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;
  if(rec.outer.length) h+=`<div class="rec-section"><div class="rec-label">🧥 外套</div><div class="rec-items">${rec.outer.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;
  if(rec.shoes.length) h+=`<div class="rec-section"><div class="rec-label">👟 鞋子</div><div class="rec-items">${rec.shoes.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;
  if(rec.accessories.length) h+=`<div class="rec-section"><div class="rec-label">🎒 配饰</div><div class="rec-items">${rec.accessories.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div></div>`;
  return h||'<div style="color:#999;padding:12px;text-align:center;">暂无推荐</div>';
}

// ─── 渲染 ───
function renderWeather(data, locName, districtName){
  const date=new Date();
  const h=date.getHours();
  const m=date.getMinutes();
  const isMorning=h>=4&&h<=8;
  const badge=document.getElementById('timeBadge');
  if(isMorning){ badge.textContent='☀️ 早安！今日天气已更新'; badge.className='time-badge morning'; }
  else{ badge.textContent=`🌤 更新于 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; badge.className='time-badge'; }

  // 用当前小时的天气数据（比 daily 更准确）
  const hourly=data.hourly;
  const nowHour=date.getHours();
  let curIdx=hourly.time.findIndex(t=>new Date(t).getHours()===nowHour);
  if(curIdx<0) curIdx=hourly.time.findIndex(t=>new Date(t).getHours()===nowHour+1);
  if(curIdx<0) curIdx=0;

  const wc=hourly.weathercode[curIdx];
  const w=wmoInfo(wc);
  const curTemp=Math.round(hourly.temperature_2m[curIdx]);
  const curWind=Math.round(hourly.windspeed_10m[curIdx]||0);
  const curPrecip=hourly.precipitation[curIdx]||0;
  const tMax=Math.round(data.daily.temperature_2m_max[0]);
  const tMin=Math.round(data.daily.temperature_2m_min[0]);
  const wind=Math.round(data.daily.windspeed_10m_max[0]||0);
  const precip=data.daily.precipitation_sum[0]||0;
  const sunrise=data.daily.sunrise?.[0]?.split('T')[1]||'';
  const sunset=data.daily.sunset?.[0]?.split('T')[1]||'';
  const hourItems=[];
  for(let i=0;i<hourly.time.length;i++){
    const ht=new Date(hourly.time[i]);
    if(ht.getHours()<nowHour-1) continue;
    if(ht.getHours()>22) break;
    if(hourItems.length>=12) break;
    hourItems.push(ht.getHours());
  }
  let hourHTML='';
  for(const hr of hourItems){
    const idx=hourly.time.findIndex(t=>new Date(t).getHours()===hr);
    if(idx<0) continue;
    const hTemp=Math.round(hourly.temperature_2m[idx]);
    const hWc=hourly.weathercode[idx];
    const hWi=wmoInfo(hWc);
    const hRainP=hourly.precipitation_probability?.[idx]||0;
    const hWind=Math.round(hourly.windspeed_10m[idx]||0);
    const isRain=RAIN_CODES.includes(hWc)||hRainP>=50;
    hourHTML+=`<div class="hour-item${isRain?' rain-alert':''}">
      <div class="h-time">${String(hr).padStart(2,'0')}:00</div>
      <div class="h-icon">${hWi.icon}</div>
      <div class="h-temp">${hTemp}°</div>
      ${hRainP>=30?`<div class="h-rain">💧${hRainP}%</div>`:''}
      ${hWind>=20?`<div class="h-wind">💨${hWind}</div>`:''}
    </div>`;
  }

  // alerts
  const alerts=buildAlerts(hourly, wind, precip, wc);

  // dressing
  const mRec=dressMan(tMax,tMin,wc,wind,precip);
  const fRec=dressWoman(tMax,tMin,wc,wind,precip);

  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="weather-card">
      <div class="weather-location">${locName}<span class="loc-district">${districtName||''}</span></div>
      <div class="weather-main">
        <div>
          <div class="weather-temp">${curTemp}°<span class="range">↕ ${tMin}° ~ ${tMax}°</span></div>
        </div>
        <div class="weather-icon">${w.icon}</div>
      </div>
      <div class="weather-desc">${w.label} · 实时 ${curTemp}°C</div>
      <div class="weather-extras">
        <span>💨 ${wind} km/h</span>
        <span>💧 ${precip} mm</span>
        ${sunrise?`<span>🌅 ${sunrise}</span>`:''}
        ${sunset?`<span>🌇 ${sunset}</span>`:''}
      </div>

      ${hourHTML?`
      <div class="hourly-section">
        <div class="hourly-title">⏱ 小时预报</div>
        <div class="hourly-scroll">${hourHTML}</div>
      </div>`:''}

      ${alerts.map(a=>`<div class="alert-bar ${a.type}">${a.msg}</div>`).join('')}
    </div>

    <div class="dressing-sect">
      <div class="dressing-title">👔 今日穿搭推荐</div>
      <div class="gender-tabs">
        <div class="gender-tab active-male" data-gender="male">🧑 男士</div>
        <div class="gender-tab" data-gender="female">👩 女士</div>
      </div>
      <!-- 男士 -->
      <div class="rec-card show" id="recMale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="male">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="male">💼 通勤牛马</div>
        </div>
        <div id="maleCasual">${renderRecHTML(mRec.casual)}</div>
        <div id="maleWork" style="display:none">${renderRecHTML(mRec.work)}</div>
      </div>
      <!-- 女士 -->
      <div class="rec-card" id="recFemale">
        <div class="style-tabs">
          <div class="style-tab active-casual" data-style="casual" data-gender="female">🛹 闲适大佬</div>
          <div class="style-tab" data-style="work" data-gender="female">💼 通勤牛马</div>
        </div>
        <div id="femaleCasual">${renderRecHTML(fRec.casual)}</div>
        <div id="femaleWork" style="display:none">${renderRecHTML(fRec.work)}</div>
      </div>
      ${mRec.tips.map(t=>`<div class="rec-tip">${t}</div>`).join('')}
    </div>
  `;

  // 性别tab
  document.querySelectorAll('.gender-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const g=tab.dataset.gender;
      document.querySelectorAll('.gender-tab').forEach(t=>{
        t.className='gender-tab';
        if(t.dataset.gender===g) t.className=`gender-tab active-${g}`;
      });
      document.getElementById('recMale').classList.toggle('show',g==='male');
      document.getElementById('recFemale').classList.toggle('show',g==='female');
    });
  });
  // 风格tab
  document.querySelectorAll('.style-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const s=tab.dataset.style;
      const g=tab.dataset.gender;
      // 切换对应性别的风格tab高亮
      tab.closest('.rec-card').querySelectorAll('.style-tab').forEach(t=>{
        t.className='style-tab';
        if(t.dataset.style===s) t.className=`style-tab active-${s}`;
      });
      // 显示/隐藏
      const prefix=g==='male'?'male':'female';
      document.getElementById(prefix+'Casual').style.display=s==='casual'?'':'none';
      document.getElementById(prefix+'Work').style.display=s==='work'?'':'none';
    });
  });
}

// ─── 获取天气 ───
async function fetchWeather(lat, lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max,sunrise,sunset&hourly=temperature_2m,weathercode,precipitation_probability,precipitation,windspeed_10m&timezone=auto&forecast_days=1`;
  const resp=await fetch(url);
  if(!resp.ok) throw new Error('天气数据获取失败');
  return resp.json();
}

// ─── 逆地理编码 ───
async function reverseGeo(lat, lon){
  // 方案1: BigDataCloud（免费无key，国内可访问）
  try{
    const url=`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`;
    const resp=await fetch(url,{headers:{'User-Agent':'WeatherApp/1.0'}});
    const d=await resp.json();
    if(d&&d.city){
      const city=d.city.replace(/市$/,'');
      const district=d.locality||d.localityInfo?.administrative?.[4]?.name||d.principalSubdivision||'';
      return {city,district:district===city?'':district};
    }
  }catch(_){}

  // 方案2: Nominatim 备用
  try{
    const url2=`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=12&accept-language=zh`;
    const resp2=await fetch(url2,{headers:{'User-Agent':'WeatherApp/1.0'}});
    const d2=await resp2.json();
    const addr=d2?.address||{};
    let city2=addr.city||addr.county||addr.city_district||addr.town||addr.state_district||'';
    let district2=addr.suburb||addr.town||addr.village||addr.county||addr.district||addr.municipality||'';
    if(district2===city2) district2='';
    city2=city2.replace(/市$/,'');
    if(!city2&&d2.display_name){
      const parts=d2.display_name.split(',').map(s=>s.trim());
      city2=parts[1]||parts[0]||'';
      district2=parts[0]||'';
      city2=city2.replace(/市$/,'');
    }
    if(city2) return {city:city2,district:district2};
  }catch(_){}

  // 兜底：显示时区+坐标
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  const tzCity=tz.split('/').pop()?.replace(/_/g,'')||'';
  return {city:tzCity||`${lat.toFixed(2)},${lon.toFixed(2)}`,district:''};
}

// ─── 主流程 ───
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

const CACHE_KEY='wx_city_v1';

navigator.geolocation.getCurrentPosition(async pos=>{
  const {latitude,longitude}=pos.coords;
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>正在查询天气…</div>';

  // 先读缓存的城市场名，立即展示（如果已有）
  const cached=localStorage.getItem(CACHE_KEY);
  if(cached){
    try{
      const c=JSON.parse(cached);
      // 先渲染占位天气卡片（数据稍后到）
      document.getElementById('app').innerHTML=`
        <div class="weather-card">
          <div class="weather-location">${c.city||'加载中…'}<span class="loc-district">${c.district||''}</span></div>
          <div class="weather-main">
            <div><div class="weather-temp">--°<span class="range">--° ~ --°</span></div></div>
            <div class="weather-icon">⏳</div>
          </div>
          <div class="weather-desc">数据加载中…</div>
        </div>
        <div class="loading" style="padding:30px"><div class="spinner"></div><div>获取天气数据…</div></div>`;
    }catch(_){}
  }

  // 并行请求天气 + 逆地理编码
  const [weather,loc]=await Promise.all([
    fetchWeather(latitude,longitude),
    reverseGeo(latitude,longitude).then(loc=>{
      localStorage.setItem(CACHE_KEY,JSON.stringify(loc));
      return loc;
    })
  ]);
  renderWeather(weather, loc.city, loc.district);
}, err=>{
  // 定位失败——尝试用缓存的城市场名+默认坐标
  const cached=localStorage.getItem(CACHE_KEY);
  let cityName='',districtName='';
  if(cached){
    try{const c=JSON.parse(cached);cityName=c.city;districtName=c.district;}catch(_){}
  }
  document.getElementById('loadingState').innerHTML='<div class="spinner"></div><div>定位失败，按上次位置查询…</div>';
  const defLat=36.45, defLon=115.98;
  fetchWeather(defLat,defLon).then(weather=>{
    renderWeather(weather, cityName||'当前位置', districtName?districtName+'（默认）':'（默认）');
  }).catch(()=>{
    showError('定位失败，请检查网络后重试');
  });
},{enableHighAccuracy:false,timeout:6000});

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="error-card">
      <div>😅 ${msg}</div>
      <button class="retry" onclick="location.reload()">重新获取</button>
    </div>`;
}
</script>
